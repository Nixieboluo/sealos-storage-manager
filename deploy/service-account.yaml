apiVersion: v1
kind: ServiceAccount
metadata:
  name: viewer-backend
  namespace: sealos-storage-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: viewer-backend
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "pods", "pods/log", "services", "events"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: viewer-backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: viewer-backend
subjects:
  - kind: ServiceAccount
    name: viewer-backend
    namespace: sealos-storage-manager
